```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Amatic+SC:wght@700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eef8ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:'Patrick Hand',cursive;
}

.card{
    width:1100px;
    height:680px;
    background:white;
    border-radius:25px;
    border:2px solid #f6d6df;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    inset:0;

    background-image:
    linear-gradient(rgba(173,216,230,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(173,216,230,.18) 1px, transparent 1px);

    background-size:80px 80px;
}

/* Camera */

.camera{
    position:absolute;
    top:20px;
    left:20px;
    width:130px;
}

/* Rainbow */

.rainbow{
    position:absolute;
    top:20px;
    right:20px;
    width:140px;
}

/* Bunnies */

.bunny2-left{
    position:absolute;
    bottom:0;
    left:0;
    width:140px;
}

.bunny3-right{
    position:absolute;
    bottom:0;
    right:20px;
    width:140px;
}

/* Main Text */

.title{
    position:absolute;
    width:100%;
    text-align:center;
    top:150px;

    font-family:'Amatic SC',cursive;
    font-size:90px;
    color:#2d76d0;
}

.subtitle{
    position:absolute;
    width:100%;
    text-align:center;
    top:280px;

    font-family:'Amatic SC',cursive;
    font-size:70px;
    color:#2d76d0;
}

.small{
    position:absolute;
    width:100%;
    text-align:center;
    top:390px;

    font-size:30px;
    color:#444;
}

/* Hearts */

.heart{
    position:absolute;
    color:#ff9eb8;
    font-size:40px;
}

.h1{top:120px;left:180px;}
.h2{top:220px;left:250px;}
.h3{top:150px;right:220px;}
.h4{top:260px;right:180px;}
.h5{bottom:180px;left:230px;}
.h6{bottom:160px;right:250px;}

/* Button */

.start-btn{
    position:absolute;
    bottom:50px;
    left:50%;
    transform:translateX(-50%);

    border:none;
    background:#ffd6e6;
    padding:18px 35px;
    border-radius:40px;

    font-size:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

    <img src="camera.png" class="camera">

    <img src="rainbow.png" class="rainbow">

    <img src="bunny2.png" class="bunny2-left">

    <img src="bunny3.png" class="bunny3-right">

    <div class="title">
        HAPPY BIRTHDAY
    </div>

    <div class="subtitle">
        MY LOVE ❤️
    </div>

    <div class="small">
        <p>💙 This page is all about you today...</p>
        Ready to see what I made for you?

        
    </div>

    <div class="heart h1">♡</div>
    <div class="heart h2">♡</div>
    <div class="heart h3">♡</div>
    <div class="heart h4">♡</div>
    <div class="heart h5">♡</div>
    <div class="heart h6">♡</div>

    <button class="start-btn"
        onclick="window.location.href='harshaaaa.html'">
        Happy 28th Birthday ✨💕🎉
    </button>

</div>

</body>
</html>
